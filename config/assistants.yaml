# Users and the assistants that belong to them.
# Each assistant is owned by exactly one user. The assistant inherits that
# user's music account and permissions unless overridden.

users:
  - id: shawn
    name: Shawn
    role: admin
    aliases: ["shawn", "boss", "owner"]
    # Music Assistant provider key (see devices.yaml -> music_accounts).
    music_account: spotify_xtpgx
    # Per-user permission overrides (optional). Falls back to permissions.yaml.
    permissions:
      can_unlock_doors: true
      can_open_garage: true
      can_disarm_alarm: true

  - id: jordie
    name: Jordie
    role: resident
    aliases: ["jordie", "jordan", "jordie rae"]
    music_account: spotify_jordierae22
    permissions:
      can_unlock_doors: true
      can_open_garage: true
      can_disarm_alarm: true

  - id: house_remote
    name: House Remote
    role: kiosk
    aliases: ["kiosk", "house remote", "room remote", "wall panel", "tablet", "ipad"]
    music_account: spotify_xtpgx
    permissions:
      can_unlock_doors: false
      can_open_garage: false
      can_disarm_alarm: false
      can_lock_doors: true
      can_control_lights: true
      can_control_fans: true
      can_control_climate: true
      can_control_music: true
      can_control_covers: true
      can_view_cameras: true

assistants:
  - id: atlas
    name: Atlas
    owner: shawn
    aliases: ["atlas"]
    wake_words: ["atlas", "hey atlas"]
    conversation_wake_phrases: ["atlas let's chat", "hey atlas let's chat", "atlas chat with me"]
    listen_enabled: true
    personality: >
      Atlas is Shawn's assistant. Calm, precise, and confident with a touch of
      dry wit. Speaks like a capable chief-of-staff: concise confirmations, no
      filler, always states exactly what was done or why it could not be done.
    tone: confident
    voice:
      provider: openai
      model: gpt-4o-mini-tts
      voice: cedar
      response_format: mp3
      output: browser
      fallback_provider: browser
      instructions: >
        Speak like a calm, confident house intelligence. Natural, concise,
        capable, and warm. Avoid robotic cadence.

  - id: chatty
    name: Chatty
    owner: jordie
    aliases: ["chatty", "chat"]
    wake_words: ["chatty", "hey chatty"]
    conversation_wake_phrases: ["chatty let's chat", "hey chatty let's chat", "chatty chat with me"]
    listen_enabled: true
    personality: >
      Chatty is Jordie's assistant. Warm, upbeat, and friendly. Conversational
      and encouraging while still being clear about what happened. Adds a little
      personality but never hides the result of an action.
    tone: friendly
    voice:
      provider: openai
      model: gpt-4o-mini-tts
      voice: coral
      response_format: mp3
      output: browser
      fallback_provider: browser
      instructions: >
        Speak as an intelligent female assistant: conversational, warm, quick,
        and composed. Keep smart-home replies brief.

  - id: jarvis
    name: Jarvis
    owner: house_remote
    aliases: ["jarvis", "house", "home"]
    wake_words: ["jarvis", "hey jarvis"]
    conversation_wake_phrases: ["jarvis let's chat", "hey jarvis let's chat", "jarvis chat with me"]
    listen_enabled: true
    personality: >
      Jarvis is the shared house assistant for wall panels, iPads, room remotes,
      and common spaces. It controls the house confidently without using private
      personal memory. It gives concise, neutral responses suitable for anyone
      in the household.
    tone: composed
    voice:
      provider: openai
      model: gpt-4o-mini-tts
      voice: ash
      response_format: mp3
      output: browser
      fallback_provider: browser
      instructions: >
        Speak like a polished shared home intelligence: clear, calm, capable,
        and concise. Avoid sounding robotic or overly personal.
