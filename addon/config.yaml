# Home Assistant Add-on manifest (scaffold).
# This shows the final packaging path; it is not published yet.
name: TPG HomeAI Orchestrator
version: "0.1.0"
slug: tpg_homeai
description: Configurable AI smart-home control layer on top of Home Assistant.
url: https://github.com/your-org/tpg-homeai
arch:
  - aarch64
  - amd64
  - armv7
init: false
# Expose the backend port to the user.
ports:
  8088/tcp: 8088
ports_description:
  8088/tcp: HomeAI Orchestrator API
# When running as an add-on, HA injects SUPERVISOR_TOKEN and the internal API
# is reachable at http://supervisor/core/api. run.sh maps these to our env.
hassio_api: true
homeassistant_api: true
map:
  - addon_config:rw
# User-configurable options surfaced in the HA UI.
options:
  openai_api_key: ""
  openai_model: "gpt-4o-mini"
  home_assistant_url: ""
  home_assistant_token: ""
schema:
  openai_api_key: "str?"
  openai_model: "str?"
  home_assistant_url: "str?"
  home_assistant_token: "str?"
