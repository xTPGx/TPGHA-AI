reload_config:
  name: Reload config
  description: >
    Tell the TPG HomeAI server to hot-reload its YAML configuration
    (households, assistants, devices, permissions).

scan_devices:
  name: Scan devices
  description: >
    Run a discovery scan against Home Assistant. Classifies entities and queues
    new ones for approval (never auto-approves high/critical risk).

approve_discovered_entity:
  name: Approve discovered entity
  description: Approve a discovered entity and write it into the device config.
  fields:
    entity_id:
      name: Entity
      required: true
      example: light.new_lamp
      selector:
        text:
    mapping:
      name: Mapping section
      description: device_aliases | cameras | locks | speakers | displays | climate | security_sensors
      required: false
      example: device_aliases
      selector:
        text:
    room:
      name: Room
      required: false
      example: office
      selector:
        text:
    friendly_name:
      name: Friendly name
      required: false
      example: Office Lamp
      selector:
        text:
    aliases:
      name: Aliases
      required: false
      selector:
        object:

ignore_discovered_entity:
  name: Ignore discovered entity
  description: Add an entity to the avoid list so the AI never targets it.
  fields:
    entity_id:
      name: Entity
      required: true
      example: media_player.dead_old_tv
      selector:
        text:
    reason:
      name: Reason
      required: false
      example: duplicate
      selector:
        text:

map_entity:
  name: Map entity
  description: Map a discovered entity as a specific device type.
  fields:
    entity_id:
      name: Entity
      required: true
      selector:
        text:
    target:
      name: Target type
      description: speaker | display | camera | security_sensor | lock | climate | device
      required: true
      example: speaker
      selector:
        text:
    room:
      name: Room
      required: false
      selector:
        text:
    friendly_name:
      name: Friendly name
      required: false
      selector:
        text:
    aliases:
      name: Aliases
      required: false
      selector:
        object:

confirm_action:
  name: Confirm action
  description: Confirm a pending sensitive action using its confirmation token.
  fields:
    confirmation_token:
      name: Confirmation token
      required: true
      selector:
        text:

cancel_confirmation:
  name: Cancel confirmation
  description: Cancel a pending sensitive action without executing it.
  fields:
    confirmation_token:
      name: Confirmation token
      required: true
      selector:
        text:

dashboard_draft:
  name: Create dashboard draft
  description: >
    Generate a Lovelace dashboard YAML draft from approved TPG HomeAI rooms and
    devices. This returns YAML for review; it does not overwrite Home Assistant
    dashboards.
  fields:
    title:
      name: Title
      required: false
      default: TPG Home
      selector:
        text:
    style:
      name: Style
      required: false
      default: native
      selector:
        select:
          options:
            - native
            - mushroom
    room:
      name: Room
      description: Optional room id/name to generate a single-room dashboard.
      required: false
      selector:
        text:
    include_browser_mod:
      name: Include Browser Mod helper
      required: false
      default: true
      selector:
        boolean:

open_panel:
  name: Open TPG HomeAI panel
  description: >
    Open or navigate to the TPG HomeAI panel. If Browser Mod is installed, this
    can navigate a specific browser/display.
  fields:
    path:
      name: Path
      required: false
      default: /tpg-homeai
      selector:
        text:
    browser_id:
      name: Browser ID
      required: false
      selector:
        text:
    use_browser_mod:
      name: Use Browser Mod
      required: false
      default: true
      selector:
        boolean:

get_knowledge_graph:
  name: Get knowledge graph
  description: >
    Return TPG HomeAI's current house graph, optionally enriched from Home
    Assistant area/device/entity registries.
  fields:
    include_registries:
      name: Include HA registries
      required: false
      default: true
      selector:
        boolean:

generate_suggestions:
  name: Generate proactive suggestions
  description: >
    Ask TPG HomeAI to analyze the current house graph and create suggested
    actions for review.

draft_memory:
  name: Draft memory
  description: >
    Propose a long-term house/user preference. It must be approved before it
    becomes active AI context.
  fields:
    scope:
      name: Scope
      required: false
      default: house
      selector:
        select:
          options:
            - house
            - user
            - room
            - device
    owner:
      name: Owner
      required: false
      selector:
        text:
    subject:
      name: Subject
      required: true
      selector:
        text:
    key:
      name: Key
      required: true
      selector:
        text:
    value:
      name: Value
      required: true
      selector:
        text:

approve_memory:
  name: Approve memory
  description: Approve a drafted memory so it becomes active AI context.
  fields:
    memory_id:
      name: Memory ID
      required: true
      selector:
        number:
          min: 1
          mode: box

ignore_memory:
  name: Ignore memory
  description: Ignore a drafted memory so it is not used as AI context.
  fields:
    memory_id:
      name: Memory ID
      required: true
      selector:
        number:
          min: 1
          mode: box

test_command:
  name: Test command
  description: >
    Send a natural-language command to the TPG HomeAI server and return the
    structured result (intent, resolved entity, message). Useful for testing
    without going through Assist.
  fields:
    text:
      name: Text
      description: The natural-language command to send.
      required: true
      example: "show me the driveway"
      selector:
        text:
    assistant_id:
      name: Assistant
      description: Assistant id to use (defaults to the integration option).
      required: false
      example: atlas
      selector:
        text:
    user_id:
      name: User
      description: User id to attribute the command to (defaults to the integration option).
      required: false
      example: shawn
      selector:
        text:
    conversation_id:
      name: Conversation ID
      description: Optional conversation id to continue a session.
      required: false
      selector:
        text:
