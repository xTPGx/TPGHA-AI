name: "TPG HomeAI Orchestrator"
version: "1.2.47"
slug: "tpg_homeai"
description: "AI smart-home orchestration layer for Home Assistant"
url: "https://github.com/xTPGx/TPGHA-AI"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
homeassistant_api: true
hassio_api: true
host_network: false
ports:
  8088/tcp: 8088
ports_description:
  8088/tcp: "TPG HomeAI API and web interface"
webui: "http://[HOST]:[PORT:8088]"
ingress: true
ingress_port: 8088
panel_icon: "mdi:robot-happy"
panel_title: "TPG HomeAI"
panel_admin: false
apparmor: true
map:
  - type: homeassistant_config
    read_only: false
  - type: addon_config
    read_only: false
options:
  home_assistant_url: "http://supervisor/core"
  home_assistant_token: ""
  openai_api_key: ""
  openai_tts_model: "gpt-4o-mini-tts"
  openai_tts_format: "mp3"
  openai_transcribe_model: "gpt-4o-mini-transcribe"
  ollama_base_url: ""
  ollama_model: ""
  voice_public_base_url: ""
  security_pin: ""
  api_token: ""
  config_dir: "/config/tpg_homeai"
  database_url: "sqlite:////config/tpg_homeai/tpg_homeai.db"
  log_level: "info"
schema:
  home_assistant_url: "str"
  home_assistant_token: "password?"
  openai_api_key: "password?"
  openai_tts_model: "str?"
  openai_tts_format: "list(mp3|opus|aac|flac|wav|pcm)?"
  openai_transcribe_model: "str?"
  ollama_base_url: "str?"
  ollama_model: "str?"
  voice_public_base_url: "str?"
  security_pin: "password?"
  api_token: "password?"
  config_dir: "str"
  database_url: "str"
  log_level: "list(debug|info|warning|error)"
  scan_on_start: "bool?"
  scan_interval_minutes: "int(1,1440)?"
  notify_on_new_devices: "bool?"
  notify_on_unavailable_devices: "bool?"
  auto_approve_low_risk_entities: "bool?"
