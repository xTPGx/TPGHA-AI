# Per-architecture base images for the Home Assistant builder. Supervisor passes
# the matching image as the BUILD_FROM build-arg (no automatic default anymore).
build_from:
  amd64: ghcr.io/home-assistant/amd64-base-python:3.12
  aarch64: ghcr.io/home-assistant/aarch64-base-python:3.12
labels:
  io.hass.type: app
args:
  REPO: https://github.com/xTPGx/TPGHA-AI
  REF: main
