# Home Assistant Add-on manifest for the TPG HomeAI Orchestrator.
# Runs the FastAPI backend and serves the built React frontend on port 8088.
name: TPG HomeAI Orchestrator
version: "0.1.0"
slug: tpg_homeai
description: Configurable AI smart-home control layer (backend + UI) on top of Home Assistant.
url: https://github.com/your-org/tpg-homeai
arch:
  - aarch64
  - amd64
  - armv7
init: false
boot: auto
startup: application

# Web UI exposed on 8088 (also surfaced through the HA sidebar via ingress).
ports:
  8088/tcp: 8088
ports_description:
  8088/tcp: HomeAI Orchestrator API + UI
ingress: true
ingress_port: 8088
panel_icon: mdi:robot-happy
webui: "http://[HOST]:[PORT:8088]"

# Allow the add-on to talk to the Supervisor / Core API.
hassio_api: true
homeassistant_api: true

# Persistent + editable config directory mapped into the add-on.
map:
  - addon_config:rw

# Options surfaced in the Home Assistant add-on UI.
options:
  openai_api_key: ""
  home_assistant_url: ""
  home_assistant_token: ""
  log_level: info
  config_path: /config/tpg_homeai
schema:
  openai_api_key: "password?"
  home_assistant_url: "str?"
  home_assistant_token: "password?"
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
  config_path: "str?"
