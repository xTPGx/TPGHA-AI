# Per-architecture base images for the add-on build.
# NOTE: the Dockerfile expects the repository ROOT as the build context (so it
# can see backend/ and frontend/). When building locally or in CI:
#
#   docker build -f addon-repository/tpg_homeai/Dockerfile \
#     --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base-python:3.12 \
#     -t local/tpg_homeai .
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base-python:3.12
  amd64: ghcr.io/home-assistant/amd64-base-python:3.12
  armv7: ghcr.io/home-assistant/armv7-base-python:3.12
labels:
  org.opencontainers.image.title: TPG HomeAI Orchestrator
  org.opencontainers.image.source: https://github.com/your-org/tpg-homeai
